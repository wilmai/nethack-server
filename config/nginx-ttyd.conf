events {}

http {
    upstream ttyd_upstream {
        server 127.0.0.1:7681;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;

        # Map Cloudflare Access header into a variable; default to "anonymous"
        # so the spawned process always gets *something* in $1.
        set $cf_email "anonymous";
        if ($http_cf_access_authenticated_user_email) {
            set $cf_email $http_cf_access_authenticated_user_email;
        }

        location / {
            # Override any client-supplied query string with our trusted email.
            # ttyd is started with `-a`, which appends ?arg=... as a positional
            # arg to the spawned command.
            proxy_pass http://ttyd_upstream$uri?arg=$cf_email;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;

            # Long-lived connections for the WS terminal.
            proxy_read_timeout 1d;
            proxy_send_timeout 1d;
        }
    }
}
