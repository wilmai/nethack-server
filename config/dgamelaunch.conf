# dgamelaunch config — minimal NetHack single-game server.
# Reference: https://github.com/paxed/dgamelaunch/blob/master/examples/dgamelaunch.conf
#
# Path conventions:
#   chroot_path / dglroot are container-host-visible.
#   Everything else (banner, bannerfile, game_path, …) is resolved INSIDE
#   the chroot, so a leading "/" means $CHROOT/… on the host.
#   %r = dglroot   %n = player name   %u = uid   %t = current TERM

# === Globals ===================================================
maxusers          = 1000
allow_new_nicks   = yes
maxnicklen        = 15
chroot_path       = "/var/dgl-chroot/"
dglroot           = "/dgldir/"
# debian "games" user
shed_uid          = 5
# debian "games" group
shed_gid          = 60
locale            = "en_US.UTF-8"
default_term      = "xterm-256color"
banner            = "/dgl-banner"
filemode          = "0666"

# === Per-user state initialization =============================
# Idempotent: run on both register and login so dirs always exist.
commands[register] = mkdir "%ruserdata/%n",
                     mkdir "%ruserdata/%n/ttyrec"

commands[login]    = mkdir "%ruserdata/%n",
                     mkdir "%ruserdata/%n/ttyrec"

# === Menus =====================================================
menu["mainmenu_anon"] {
    bannerfile      = "/dgl_menu_anon.txt"
    cursor          = (17, 12)
    commands["l"]   = ask_login
    commands["r"]   = ask_register
    commands["w"]   = watch_menu
    commands["q"]   = quit
}

menu["mainmenu_user"] {
    bannerfile      = "/dgl_menu_user.txt"
    cursor          = (17, 12)
    commands["p"]   = play_game "nh500"
    commands["c"]   = chpasswd
    # rcfile editor: seed from template on first edit, open in dgl's ee
    commands["o"]   = ifnxcp "/dgl-default.nethackrc" "%ruserdata/%n/%n.nethackrc",
                      exec   "/usr/bin/ee"            "%ruserdata/%n/%n.nethackrc"
    commands["w"]   = watch_menu
    commands["q"]   = quit
}

# === Game: NetHack ==============================================
DEFINE {
    game_path     = "/usr/games/nethack"
    game_name     = "NetHack 5.0.0"
    short_name    = "nh500"
    game_args     = "/usr/games/nethack", "-u", "%n"
    inprogressdir = "/dgldir/inprogress/"
    ttyrecdir     = "%ruserdata/%n/ttyrec/"
    # in-game mail spool (chmail + SIMPLEMAIL)
    spooldir      = "/mail/"
    # default rcfile (copied on first edit); per-user rcfile path
    rc_template   = "/dgl-default.nethackrc"
    rc_fmt        = "%ruserdata/%n/%n.nethackrc"
    # Pre-game commands.
    commands      = setenv "HOME"            "%ruserdata/%n",
                    setenv "MAIL"            "/mail/%n",
                    setenv "SIMPLEMAIL"      "1",
                    setenv "NETHACKOPTIONS"  "@%ruserdata/%n/%n.nethackrc",
                    cp     "/usr/games/lib/nethackdir/save/%u%n.gz"
                           "/usr/games/lib/nethackdir/save/%u%n.gz.bak"
}
